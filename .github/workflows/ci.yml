name: CI

on: [push, pull_request]

jobs:

  build_windows:
    runs-on: windows-latest
    strategy:
      matrix:
        architecture: [x64, arm64]
    steps:
    - uses: actions/checkout@v7
      with:
        fetch-depth: 99
        submodules: recursive
    - uses: actions/setup-dotnet@v5
      with:
        dotnet-version: |
          8.0.x
          10.0.x
    - uses: actions/setup-node@v6
      with:
        node-version: 24
    - uses: actions/setup-go@v6
      with:
        cache: false
        go-version: 1.25
    - name: Build and test
      shell: pwsh
      run: ./build-and-test.ps1 -configuration Release -architecture ${{ matrix.architecture }} -ci
    - name: publish artifact
      uses: actions/upload-artifact@v7
      with:
        name: ${{ env.artifact_name }}
        path: ${{ env.artifact_path }}
    - name: publish secondary artifact
      uses: actions/upload-artifact@v7
      if: env.secondary_artifact_name != ''
      with:
        name: ${{ env.secondary_artifact_name }}
        path: ${{ env.secondary_artifact_path }}

  prebuild_devcontainer:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - uses: actions/checkout@v7
      with:
        fetch-depth: 99
        submodules: recursive
    - uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Pre-build dev container image
      uses: devcontainers/ci@v0.3
      with:
        configFile: .devcontainer/devcontainer.json
        imageName: ghcr.io/${{ github.repository }}/devcontainer
        cacheFrom: ghcr.io/${{ github.repository }}/devcontainer
        push: always

  build_linux:
    runs-on: ubuntu-latest
    needs: prebuild_devcontainer
    permissions:
      contents: read
      packages: read
    strategy:
      matrix:
        architecture: [x64, arm64]
    steps:
    - uses: actions/checkout@v7
      with:
        fetch-depth: 99
        submodules: recursive
    - uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Calculate version
      shell: bash
      run: echo "VERSION_SUFFIX=$(pwsh ./build/make-version.ps1 -suffix beta)" | tee -a $GITHUB_ENV
    - uses: devcontainers/ci@v0.3
      env:
        VERSION_SUFFIX: ${{ env.VERSION_SUFFIX }}
      with:
        push: never
        configFile: .devcontainer/devcontainer.json
        imageName: ghcr.io/${{ github.repository }}/devcontainer
        cacheFrom: ghcr.io/${{ github.repository }}/devcontainer
        runCmd: ./build-and-test.ps1 -configuration Release -architecture ${{ matrix.architecture }}
        env: |
          DOTNET_NOLOGO=true
          DOTNET_SKIP_FIRST_TIME_EXPERIENCE=true
          DOTNET_CLI_TELEMETRY_OPTOUT=true
          VERSION_SUFFIX
    - name: re-map path variables from container
      shell: pwsh
      run: |
        foreach ($name in @("artifact_path", "secondary_artifact_path")) {
          $existing = [System.Environment]::GetEnvironmentVariable($name)
          $updated = $existing.Replace("/workspaces/bcad", "${{ github.workspace }}")
          Write-Output "$name=$updated" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        }
    - name: publish artifact
      uses: actions/upload-artifact@v7
      with:
        name: ${{ env.artifact_name }}
        path: ${{ env.artifact_path }}
    - name: publish secondary artifact
      uses: actions/upload-artifact@v7
      if: env.secondary_artifact_name != ''
      with:
        name: ${{ env.secondary_artifact_name }}
        path: ${{ env.secondary_artifact_path }}

  create_package_feeds:
    runs-on: ubuntu-latest
    needs: [build_windows, build_linux, prebuild_devcontainer]
    permissions:
      contents: read
      packages: read
    steps:
    - uses: actions/checkout@v7
      with:
        fetch-depth: 99
        submodules: recursive
    - uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - uses: actions/download-artifact@v8
      with:
        path: artifacts
    - name: Calculate version
      shell: bash
      run: echo "VERSION_SUFFIX=$(pwsh ./build/make-version.ps1 -suffix beta)" | tee -a $GITHUB_ENV
    - name: create package feed data
      uses: devcontainers/ci@v0.3
      env:
        VERSION_SUFFIX: ${{ env.VERSION_SUFFIX }}
      with:
        push: never
        configFile: .devcontainer/devcontainer.json
        imageName: ghcr.io/${{ github.repository }}/devcontainer
        cacheFrom: ghcr.io/${{ github.repository }}/devcontainer
        runCmd: ./create-package-feeds.sh --artifacts-directory artifacts --flatpak-feed-path artifacts/flatpak-feed.tar.gz --win-feed-path artifacts/win-feed.tar.gz
        env: |
          VERSION_SUFFIX
    - name: publish version artifact
      uses: actions/upload-artifact@v7
      with:
        name: version.txt
        path: artifacts/version.txt
    - name: publish flatpak package feed artifact
      uses: actions/upload-artifact@v7
      with:
        name: flatpak-feed
        path: artifacts/flatpak-feed.tar.gz
    - name: publish win package feed artifact
      uses: actions/upload-artifact@v7
      with:
        name: win-feed
        path: artifacts/win-feed.tar.gz
